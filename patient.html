<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50">
    <div class="max-w-md mx-auto p-4">
        <div class="flex items-center mb-6">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white mr-3 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800">Wniosek e-Recepta</h1>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow-md border border-slate-100">
            <div class="space-y-4">
                <input id="name" type="text" placeholder="Imię i Nazwisko" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="pesel" type="text" placeholder="PESEL" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="medicine" type="text" placeholder="Lek i dawkowanie" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="submitForm()" id="subBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">Wyślij do lekarza</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function submitForm() {
            const btn = document.getElementById('subBtn');
            btn.innerHTML = "Wysyłanie...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('name').value,
                pesel: document.getElementById('pesel').value,
                medicine: document.getElementById('medicine').value,
                chatId: tg.initDataUnsafe.user.id
            };

            await fetch('/api/apply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            tg.showConfirm("Wniosek został wysłany. Oczekuj na wiadomość od bota.", () => {
                tg.close();
            });
        }
    </script>
</body>
</html>
